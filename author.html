<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AUTHOR</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="icons/archive0.png">
</head>
<body>
<header class="site-header">
<div class="brand"><a href="index.html">ARCHIVE</a></div>
<div class="header-actions">
  <a href="main.html" class="circle-btn home-circle"></a>
  <a href="index.html" class="circle-btn board-circle"></a>
  <a href="time.html" class="circle-btn time-circle"></a>
  <a href="drama.html" class="circle-btn drama-circle"></a>
  <a href="ms.html" class="circle-btn ms-circle"></a>
  <a href="favorites.html" class="circle-btn fav-circle"></a>
  <a href="admin.html" class="circle-btn admin-circle"></a>
</div>
</header>

<div class="page">
    <a href="javascript:history.back()" class="back-link">← 돌아가기</a>
    <h2 id="name">작가 작품 목록</h2>
    <div id="list" class="card-grid"></div>
</div>

<button id="scrollTopBtn">▲</button>
<button id="scrollBottomBtn">▼</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCqUVEubrHk2A5gIGdSNum63NFUFCG1jQI",
    authDomain: "my-archive-00.firebaseapp.com",
    projectId: "my-archive-00",
    storageBucket: "my-archive-00.firebasestorage.app",
    messagingSenderId: "626393416245",
    appId: "1:626393416245:web:0d0b6fbd8fe76d2f77277c",
    databaseURL: "https://my-archive-00-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 1. 선택된 작가 이름 가져오기
const author = localStorage.getItem("selectedAuthor");
document.getElementById("name").textContent = author + " 작가님 작품";

// 2. Firebase에서 데이터 불러와서 필터링하기
async function loadAuthorWorks() {
    const listWrap = document.getElementById("list");
    const dbRef = ref(db);
    
    try {
        const snapshot = await get(child(dbRef, 'userData'));
        if (snapshot.exists()) {
            const allData = snapshot.val();
            listWrap.innerHTML = ""; // 로딩 문구 등 초기화

            // 객체를 배열로 변환하여 순회
            Object.keys(allData).reverse().forEach(key => {
                const item = allData[key];
                
                // 해당 작가의 작품인지 확인 (그림, 스토리, 구버전 작가명 모두 체크)
                if (item.artist === author || item.writer === author || item.author === author) {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <img class="card-thumb" src="${item.thumbnail || ""}">
                        <div class="card-body">
                            <div class="card-title">${item.title || ""}</div>
                            <div class="card-rating">★ ${item.rating || ""}</div>
                        </div>
                    `;
                    
                    card.onclick = () => {
                        localStorage.setItem("selectedItem", JSON.stringify(item));
                        location.href = "detail.html";
                    };
                    listWrap.appendChild(card);
                }
            });

            if (listWrap.innerHTML === "") {
                listWrap.innerHTML = "<p style='padding:20px;'>해당 작가의 작품을 찾을 수 없습니다.</p>";
            }
        }
    } catch (error) {
        console.error("데이터 로드 실패:", error);
        listWrap.innerHTML = "<p>데이터를 불러오는 중 오류가 발생했습니다.</p>";
    }
}

// 실행
loadAuthorWorks();
</script>

<script>
/* 스크롤 버튼 로직 (기존 유지) */
document.getElementById('scrollTopBtn').onclick = () => window.scrollTo({top:0, behavior:'smooth'});
document.getElementById('scrollBottomBtn').onclick = () => window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
</script>

</body>
</html>
